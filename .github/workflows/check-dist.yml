name: Check dist

'on':
  pull_request:
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  check-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format-check

      - name: Linting
        run: npm run lint

      - name: Build
        run: |
          npm run build
          npm run package

      - name: Test
        run: npm run test
