---
name: release-please

"on":
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: tag major and minor versions
        if: ${{ steps.release.outputs.release_created }}
        env:
          MAJOR: ${{ steps.release.outputs.major }}
          MINOR: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -d v$MAJOR || true
          git tag -d v$MINOR || true
          git push origin :v$MAJOR || true
          git push origin :v$MINOR || true
          git tag -a v$MAJOR -m "Release v$MAJOR"
          git tag -a v$MINOR -m "Release v$MINOR"
          git push origin v$MAJOR
          git push origin v$MINOR
