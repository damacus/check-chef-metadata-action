---
name: Check action

'on':
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Build dist/
        run: npm ci && npm run build && npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-failure:
    needs: build
    runs-on: ubuntu-24.04-slim
    permissions:
      checks: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: ./
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file_path: test/fixtures/metadata.incorrect.rb
          report_checks: true
          comment_on_pr: true

  test-success:
    needs: build
    runs-on: ubuntu-24.04-slim
    permissions:
      checks: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file_path: test/fixtures/metadata-action.rb
